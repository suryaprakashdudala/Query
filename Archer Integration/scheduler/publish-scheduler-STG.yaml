apiVersion: batch/v1
kind: CronJob
metadata:
  name: publish-schedule
  namespace: "sqm-k8s0qj-stag"
spec:
  schedule: "0 1,13 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            supplementalGroups:
              - 9999
            runAsNonRoot: true
            fsGroup: 9999
          containers:
          - image: mongo:7.0
            name: publish-schedule
            securityContext:
              runAsUser: 999
              runAsGroup: 9999
            resources:
              limits:
                cpu: 1000m
                memory: 4Gi
              requests:
                cpu: 50m
                memory: 2Gi
            env:
            - name: MongoUser
              valueFrom:
                secretKeyRef:
                  name: sqmatlassecret
                  key: user
            - name: MongoPassword
              valueFrom:
                secretKeyRef:
                  name: sqmatlassecret
                  key: password
            - name: FiscalYear
              value: "2024"
            - name: Connection
              value: "mongodb+srv://$(MongoUser):$(MongoPassword)@rac-atlas-uat.ofuwr.mongodb.net/isqcstg"           
            command: ["/bin/sh"]
            args: ["-c", "mongosh $(Connection) /stg_publish/scripts/BKCC_Lock_Scenario_Insert_records_for_Pending_Assignments.js
                   && mongosh $(Connection) /stg_publish/scripts/NotificationsBatchJob.js
                   && mongosh $(Connection) /stg_publish/scripts/Sqm_Archer_Control_Owner_Operator_Query.js && mongoexport $(Connection) --collection sqmcontrolownersoperators  --type=csv --fields=UserName,Email,FiscalYear,UserGroup --out /stg_publish/sqmcontrolownersoperators.csv
                   && mongosh $(Connection) /stg_publish/scripts/Archer_Master_Data_Process_Query.js && mongoexport $(Connection) --collection masterDataProcess --type=csv --fields=UniqueId,ProcessName,ProcessDescription,FiscalYear,EventType,EventAction,LastPublishedRecordStatus,EventDate,LastProcessedDate,PCAOB_Configured_Object --out /stg_publish/masterDataProcess.csv
                   && mongosh $(Connection) /stg_publish/scripts/Archer_Master_Data_Functions.js && mongoexport $(Connection) --collection masterDataFunction --type=csv --fields=FunctionId,FunctionName,FiscalYear,EventType,EventAction,LastPublishedRecordStatus,EventDate,LastFlagProcessedDate --out /stg_publish/masterDataFunction.csv
                   && mongosh $(Connection) /stg_publish/scripts/Sqm_Archer_AEC_Leadership.js && mongoexport $(Connection) --collection SQMLeadershipRoles --type=csv --fields=UserName,Email,FiscalYear --out /stg_publish/sqmleadershiproles.csv
                   && mongosh $(Connection) /stg_publish/scripts/Sqm_Archer_KeyControl_IECs.js && mongoexport $(Connection) --collection sqmarcherkeycontrol_iec --type=csv --fields=UniqueControlId,EntityId,ControlName,FiscalYear,IECId,IEC,IpeSystemsApplicable,IsThisIECReportOrOther,IECReportType,ControlOwnerProceduresOverCompleteness,ControlOwnerProceduresOverCompletenessLocal,IECRationale,IECRationaleLocal,IECSystems,IECLocal --out /stg_publish/sqmarcherkeycontroliec.csv
                   && mongosh $(Connection) /stg_publish/scripts/Sqm_Archer_Documentation_Query.js 
                   && mongoexport $(Connection) --collection=sqmarcherkeycontrol --type=csv --fields=UniqueControlID,EntityId,NetworkId,AreaId,RegionId,ClusterId,SubClusterId,MemberFirmId,EntityType,ControlName,ControlDescription,ControlType,ControlNature,Frequency,ControlOwnerTitles,ControlOwnerTitleAssignments,ControlOperatorTitles,ControlOperatorTitleAssignments,FunctionId,FunctionName,FunctionOwnerTitle,FunctionOwnerAssignments,ProcessUniqueId,ControlObjective,QualityObjectiveUniquesIds,ActiveQualityRiskUniqueIds,IECSystems,IsControlOverResource,ResourceType,ResourceName,ServiceLine,ControlCriteria,SupportingITApplication,IEC,IECReportType,IsThisIECReportOrOther,ControlOwnerProceduresOverCompleteness,ControlOwnerProceduresOverCompletenessLocal,IECRationale,IECRationaleLocal,SupportingEvidence,ControlDesignedByType,ControlDesignedByName,ExecutingEntity,PerformedOnBehalfOf,FiscalYear,FunctionBaselineControlDesign,FunctionBaselineLocalControlDesign,FunctionBaselineControlExecution,ResourceIds,RelatedPolicyProcedureManualGuidance,KeyControlOperatedByServiceProvider,ServiceProviderName,EngagementType,Tags,ActiveQualitySubRiskUniqueIds,LocalLanguage,ControlNameLocal,ControlDescriptionLocal,ServiceProviderNameLocal,ControlObjectiveLocal,ControlCriteriaLocal,IECLocal,SupportingEvidenceLocal,IsControlOverResourceNew,KeyControlOperatedByServiceProviderNew,EventType,EventAction,LastPublishedRecordStatus,RejectedQualityRiskUniqueIds,RejectedSubQualityRiskUniqueIds,EventDate,FirmPublishedDate,LastProcessedDate,IECIDs,ControlsByPeriod,SuperRegionId,IsQoOverrideEnabled --out /stg_publish/sqmarcherkeycontrol.csv
                   && mongoexport $(Connection) --collection=sqmarcherqualityrisk --type=csv --fields=QualityRiskUniqueId,EntityId,NetworkId,AreaId,RegionId,ClusterId,SubClusterId,MemberFirmId,EntityType,QualityRiskName,QualityRiskDescription,QualityObjectiveUniqueIds,FiscalYear,EventType,EventAction,LastPublishedRecordStatus,EventDate,FirmPublishedDate,LastProcessedDate --out /stg_publish/sqmarcherqualityrisk.csv
                   && mongoexport $(Connection) --collection=sqmarchersubrisk --type=csv --fields=QualitySubRiskUniqueId,EntityId,NetworkId,AreaId,RegionId,ClusterId,SubClusterId,MemberFirmId,EntityType,QualitySubRiskName,QualitySubRiskDescription,QualityRiskId,FiscalYear,EventType,EventAction,LastPublishedRecordStatus,EventDate,FirmPublishedDate,LastProcessedDate --out /stg_publish/sqmarchersubrisk.csv
                   && mongoexport $(Connection) --collection=sqmarcherqualityobjective --type=csv --fields=QualityObjectiveID,EntityId,NetworkId,AreaId,RegionId,ClusterId,SubClusterId,MemberFirmId,EntityType,QualityObjectiveName,QualityObjectiveDescription,Component,FiscalYear,EventType,EventAction,LastPublishedRecordStatus,EventDate,FirmPublishedDate,LastProcessedDate --out /stg_publish/sqmarcherqualityobjective.csv
                   && mongoexport $(Connection) --collection=sqmarcherresources --type=csv --fields=UniqueId,ResourceType,Name,Description,EntityId,EntityType,ResourceCategory,Function/SL,TechnologyFunction,TypeOfEngagements,ServiceLineToWhichThisResourceApplies,CommunicationMethod,IsResourceProvidedByService,NameOfServiceProvider,RelatedQualityRisks,LinkToResource,LinkToUserGuide,Tags,FiscalYear,EventType,EventAction,LastPublishedRecordStatus,EventDate,FirmPublishedDate,MultiFunction/SL,MultiTechnologyFunction,CategoryServiceProvider --out /stg_publish/sqmarcherresources.csv
                   && mongoexport $(Connection) --collection=sqmarcherfunction --type=csv --fields=UniqueRowId,FunctionId,EntityFunctionId,EntityId,NetworkId,AreaId,BusinessUnitId,ClusterId,SubClusterId,MemberFirmId,EntityType,FunctionName,FunctionLeaderTitle,FunctionLeaderTitleAssignment,FiscalYear,FunctionLeaderTitleAssignmentDisplayName,EventType,EventAction,LastPublishedRecordStatus,EventDate,FirmPublishedDate,LastProcessedDate,RegionId --out /stg_publish/sqmArcherFunctionLeader.csv
                   && mongosh $(Connection) /stg_publish/scripts/Sqm_Archer_Entities_Query.js && mongoexport $(Connection) --collection archerentities  --type=csv --fields=Type,EYNetworkUniqueId,EYNetwork,EYAreaUniqueId,EYArea,EYBusinessUnitUniqueId,EYBusinessUnit,EYClusterUniqueId,EYCluster,EYSubClusterUniqueId,EYSubCluster,GroupNetworkUniqueId,GroupNetwork,GroupAreaUniqueId,GroupArea,GroupBusinessUnitUniqueId,GroupBusinessUnit,GroupClusterUniqueId,GroupCluster,GroupSubClusterUniqueId,GroupSubCluster,Name,IsPartOfGroup,GroupName,GcdId,Abbreviation,Location,UltimateResponsibilitySqmTitle,UltimateResponsibilitySqmAssignments,OperationalResponsibilitySqmTitle,OperationalResponsibilitySqmAssignments,OperationalResponsibilityComplianceWithRequirementTitle,OperationalResponsibilityComplianceWithRequirementAssignments,OperationalResponsibilityMonitoringAndRemediationTitle,OperationalResponsibilityMonitoringAndRemediationAssignments,UltimateResponsibilitySqmAssignmentsName,OperationalResponsibilitySqmAssignmentsName,OperationalResponsibilityComplianceWithRequirementAssignmentsName,OperationalResponsibilityMonitoringAndRemediationAssignmentsName,SQMLeadership,FiscalYear,FirmPublishedDate,Archived,MemberFirmId,FirstFirmPublishedDate,Rollforwarded,Published,RollforwardedDate,ArchivedDate,EventType,EventAction,LastPublishedRecordStatus,EventDate,PCAOBRegistered,UltimateResponsibilityQCTitle,UltimateResponsibilityQCassignments,UltimateResponsibilityQCassignmentsName,OperationalResponsiblityQCTitle,OperationalResponsiblityQCassignments,OperationalResponsiblityQCassignmentsName,OperationalResponsibilityComplianceWithRequirementQCTitle,OperationalResponsibilityComplianceWithRequirementQCAssignments,OperationalResponsibilityComplianceWithRequirementQCAssignmentsName,OperationalResponsibilityMonitoringAndRemediationQCTitle,OperationalResponsibilityMonitoringAndRemediationQCAssignments,OperationalResponsibilityMonitoringAndRemediationQCAssignmentsName,IndividualOperationalResponsibilityQCGovernanceAndLeadershipTitle,IndividualOperationalResponsibilityQCGovernanceAndLeadershipAssignments,IndividualOperationalResponsibilityQCGovernanceAndLeadershipAssignmentsName,IndividualOperationalResponsibilityQCAcceptanceAndContinuanceOfEngagementsTitle,IndividualOperationalResponsibilityQCAcceptanceAndContinuanceOfEngagementsAssignments,IndividualOperationalResponsibilityQCAcceptanceAndContinuanceOfEngagementsAssignmentsName,IndividualOperationalResponsibilityQCEngagementPerformanceTitle,IndividualOperationalResponsibilityQCEngagementPerformanceAssignments,IndividualOperationalResponsibilityQCEngagementPerformanceAssignmentsName,IndividualOperationalResponsibilityQCResourcesTitle,IndividualOperationalResponsibilityQCResourcesAssignments,IndividualOperationalResponsibilityQCResourcesAssignmentsName,IndividualOperationalResponsibilityQCInformationAndCommunicationTitle,IndividualOperationalResponsibilityQCInformationAndCommunicationAssignments,IndividualOperationalResponsibilityQCInformationAndCommunicationAssignmentsName,SQMPCAOBLeadership,EYRegionUniqueId,EYRegion,GroupRegionUniqueId,GroupRegion --out /stg_publish/archerentities.csv"]
            volumeMounts:
              - name: azure-file-share
                mountPath: /stg_publish
                subPath: stg_publish
          volumes:
            - name: azure-file-share
              persistentVolumeClaim:
                claimName: sqm-azure-fileshare-pvc          
          restartPolicy: Never 
          imagePullSecrets:
            - name: acrsecret          
      backoffLimit: 2
